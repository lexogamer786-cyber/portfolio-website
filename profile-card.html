<!DOCTYPE html>
<html lang="en">
<head>
  <!--
  ============================================
   <head> TAG — YEH BROWSER KO BATATA HAI:
   - Page ka title kya hai (tab mein dikhta hai)
   - Kaunsa font use karna hai
   - CSS styles kahan hain
  ============================================
  -->

  <meta charset="UTF-8" />
  <!-- meta charset = characters sahi dikhenge (Hindi, Urdu, etc.) -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- viewport = mobile pe sahi size mein dikhega -->

  <title>Sofiyan — Profile</title>
  <!-- title = browser tab mein jo naam dikhta hai -->

  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Crimson+Pro:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <!-- link tag = Google se font load kar raha hai internet se -->

  <style>
    /*
    ============================================
     <style> TAG — CSS YAHAN LIKHTE HAIN
     CSS = design, color, size, position sab
    ============================================
    */

    /* * = page ke har element pe yeh apply hoga */
    * {
      margin: 0;       /* bahar ki space zero */
      padding: 0;      /* andar ki space zero */
      box-sizing: border-box; /* size calculate karne ka tarika */
    }

    /* body = poora page */
    body {
      /* min-height = page kam se kam itna lamba hoga */
      min-height: 100vh; /* vh = viewport height, 100vh = poori screen */

      /* display flex = items ko arrange karne ka modern tarika */
      display: flex;
      align-items: center;     /* upar-neeche center */
      justify-content: center; /* left-right center */

      /* background = gradient — 2 rang mein smooth change */
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);

      font-family: 'Space Grotesk', sans-serif;
      padding: 40px 20px;
    }

    /* .card = class selector — jo element class="card" hai usse style milega */
    .card {
      background: rgba(255, 255, 255, 0.05); /* thoda transparent white */
      border: 1px solid rgba(255, 255, 255, 0.12); /* patla border */
      border-radius: 24px; /* corners round karo */
      padding: 40px 32px;  /* andar ki space */
      max-width: 360px;    /* zyada wide mat ho */
      width: 100%;         /* mobile pe full width lo */
      text-align: center;  /* saara text center */

      /* backdrop-filter = glass effect — peeche blur */
      backdrop-filter: blur(20px);

      /* box-shadow = card ke neeche shadow */
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);

      /* animation = page load pe effect */
      animation: slideUp 0.7s ease both;
    }

    /* PHOTO SECTION */
    .photo-wrapper {
      position: relative;  /* andar ke elements position kar sake */
      display: inline-block;
      margin-bottom: 24px;
    }

    /* .photo = profile picture circle */
    .photo {
      width: 110px;
      height: 110px;
      border-radius: 50%; /* 50% = perfect circle */
      object-fit: cover;  /* image crop hokar fit hogi */

      /* border = rang wala ring photo ke around */
      border: 3px solid transparent;
      background:
        linear-gradient(#1a1a2e, #1a1a2e) padding-box,
        linear-gradient(135deg, #a78bfa, #60a5fa) border-box;
        /* gradient border trick */
    }

    /* .online-dot = green dot — "available" dikhata hai */
    .online-dot {
      position: absolute; /* exact jagah rakho */
      bottom: 6px;
      right: 6px;
      width: 14px;
      height: 14px;
      background: #4ade80; /* green color */
      border-radius: 50%;
      border: 2px solid #1a1a2e;

      /* animation = dot pulse karta rahega */
      animation: pulse 2s infinite;
    }

    /* NAME */
    .name {
      font-size: 1.7rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    /* TITLE */
    .title {
      font-family: 'Crimson Pro', serif; /* alag font — italic style */
      font-style: italic;
      font-size: 1rem;
      color: #a78bfa; /* purple color */
      margin-bottom: 28px;
    }

    /* DIVIDER = patli line */
    .divider {
      height: 1px;
      background: rgba(255,255,255,0.1);
      margin: 0 0 24px 0;
    }

    /* SKILLS SECTION */
    .skills-title {
      font-size: 0.7rem;
      letter-spacing: 0.15em; /* letters ke beech space */
      text-transform: uppercase; /* sab CAPITAL */
      color: rgba(255,255,255,0.4);
      margin-bottom: 14px;
    }

    /* .skills-wrap = skills ke tags ka container */
    .skills-wrap {
      display: flex;       /* ek line mein rakho */
      flex-wrap: wrap;     /* space nahi toh neeche jao */
      gap: 8px;            /* tags ke beech space */
      justify-content: center;
      margin-bottom: 28px;
    }

    /* .tag = ek skill badge */
    .tag {
      background: rgba(167, 139, 250, 0.12); /* halka purple */
      color: #c4b5fd;
      border: 1px solid rgba(167, 139, 250, 0.25);
      padding: 5px 12px;
      border-radius: 20px; /* pill shape */
      font-size: 0.78rem;
      font-weight: 500;

      /* transition = hover pe smooth change */
      transition: all 0.2s;
    }

    /* .tag:hover = mouse upar aane pe */
    .tag:hover {
      background: rgba(167, 139, 250, 0.25);
      transform: translateY(-2px); /* thoda upar uthao */
    }

    /* CONTACT BUTTON */
    /* <a> tag = link hota hai — yahan button ki tarah design kiya */
    .contact-btn {
      display: block;        /* poori width lo */
      background: linear-gradient(135deg, #a78bfa, #60a5fa); /* gradient */
      color: white;
      text-decoration: none; /* underline hatao */
      padding: 14px 24px;
      border-radius: 12px;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.03em;
      transition: all 0.25s;
      margin-bottom: 12px;
    }

    .contact-btn:hover {
      transform: translateY(-3px); /* hover pe upar uthao */
      box-shadow: 0 10px 30px rgba(167, 139, 250, 0.35);
    }

    /* WHATSAPP BUTTON */
    .wa-btn {
      display: block;
      background: rgba(74, 222, 128, 0.1);
      color: #4ade80;
      border: 1px solid rgba(74, 222, 128, 0.25);
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 500;
      font-size: 0.88rem;
      transition: all 0.25s;
    }

    .wa-btn:hover {
      background: rgba(74, 222, 128, 0.2);
      transform: translateY(-2px);
    }

    /* LOCATION */
    .location {
      margin-top: 20px;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.05em;
    }

    /*
    ============================================
     @keyframes = animation define karte hain
     slideUp = neeche se upar aata hai
    ============================================
    */
    @keyframes slideUp {
      from {
        opacity: 0;              /* invisible */
        transform: translateY(30px); /* 30px neeche */
      }
      to {
        opacity: 1;              /* visible */
        transform: translateY(0);    /* original jagah */
      }
    }

    /* pulse = dot ke liye glow animation */
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.5); }
      50%       { box-shadow: 0 0 0 6px rgba(74, 222, 128, 0); }
    }

  </style>
</head>

<!--
============================================
 <body> TAG — JO SCREEN PE DIKHTA HAI SAB YAHAN
============================================
-->
<body>

  <!-- .card = poora profile card -->
  <div class="card">

    <!-- PHOTO -->
    <div class="photo-wrapper">
      <!--
        <img> tag = image dikhata hai
        src = image ka address (abhi placeholder hai)
        alt = image na load ho toh kya likhe
        Apni photo daalni ho toh:
        src="sofiyan.jpg" — photo same folder mein rakh
      -->
      <img
        src="https://api.dicebear.com/7.x/initials/svg?seed=SS&backgroundColor=a78bfa&textColor=ffffff"
        alt="Sofiyan"
        class="photo"
      />
      <!-- green dot — available for work -->
      <span class="online-dot"></span>
    </div>

    <!-- NAME -->
    <!-- <h1> = sabse bada heading tag -->
    <h1 class="name">Sofiyan</h1>

    <!-- TITLE/ROLE -->
    <!-- <p> = paragraph tag — normal text ke liye -->
    <p class="title">Web Developer & Software Developer</p>

    <!-- DIVIDER = patli line -->
    <div class="divider"></div>

    <!-- SKILLS -->
    <p class="skills-title">Skills</p>

    <!-- flex container — sab tags ek saath wrap honge -->
    <div class="skills-wrap">
      <!-- har skill ek .tag div hai -->
      <div class="tag">HTML5</div>
      <div class="tag">CSS3</div>
      <div class="tag">JavaScript</div>
      <div class="tag">Python</div>
      <div class="tag">C</div>
      <div class="tag">C++</div>
      <div class="tag">Flexbox</div>
      <div class="tag">CSS Grid</div>
      <div class="tag">Responsive</div>
      <div class="tag">MS Office</div>
      <div class="tag">Canva</div>
      <div class="tag">Video Editing</div>
    </div>

    <!--
      <a> tag = LINK tag — sabse important tag!
      href = kahan jaana hai click pe
      mailto: = email app khulega
      target="_blank" = naya tab mein khulega
    -->
    <a href="mailto:lexogamer786@gmail.com" class="contact-btn">
      📧 lexogamer786@gmail.com
    </a>

    <!--
      WhatsApp link — wa.me/number format
      +91 country code India ka
    -->
    <a href="https://wa.me/919703434281" target="_blank" class="wa-btn">
      💬 WhatsApp: +91 97034 34281
    </a>

    <!-- location text — sirf dikhane ke liye, koi link nahi -->
    <p class="location">📍 Hyderabad, Telangana</p>

  </div>
  <!--
  ============================================
   JS nahi hai is project mein — pure HTML+CSS!
   Yeh dikhata hai ki sirf CSS se bhi
   animations aur effects ho sakte hain.
  ============================================
  -->
</body>
</html>
